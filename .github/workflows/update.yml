name: Update Messages Data
on:
  issues:
    types: [opened]  # 监听新Issue创建事件

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write  # 需要关闭Issue的权限
    steps:
      - name: 检出仓库代码
        uses: actions/checkout@v4

      - name: 初始化数据文件
        run: |
          if [ ! -f messages.json ]; then
            echo '{"normalPwd":"995566","adminPwd":"995566995566","messages":[],"logs":[]}' > messages.json
          fi

      - name: 提取留言并写入文件
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('messages.json', 'utf8'));
            const issue = context.payload.issue;

            // 只处理标题为"留言"的Issue
            if (issue.title === '留言') {
              data.messages.unshift({
                content: issue.body,
                time: new Date().toLocaleString('zh-CN'),
                ip: issue.user.login || '匿名用户'
              });

              fs.writeFileSync('messages.json', JSON.stringify(data, null, 2));

              // 自动关闭Issue
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed'
              });
            }

      - name: 提交并推送数据
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add messages.json
          git commit -m "自动添加留言"
          git push
