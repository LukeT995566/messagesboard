name: Update Messages Data
on:
  workflow_dispatch:
    inputs:
      action:
        required: true
      data:
        required: false

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: 处理数据
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('messages.json', 'utf8'));
            const action = '${{ inputs.action }}';
            const d = '${{ inputs.data }}' ? JSON.parse('${{ inputs.data }}') : {};

            switch(action) {
              case 'addMsg': data.messages.unshift(d); break;
              case 'deleteMsg': data.messages.splice(d.index, 1); break;
              case 'clearMsg': data.messages = []; break;
              case 'addLog': data.logs.unshift(d); break;
              case 'deleteLog': data.logs.splice(d.index, 1); break;
              case 'clearLog': data.logs = []; break;
              case 'changePwd': data.normalPwd = d.newPwd; break;
            }

            fs.writeFileSync('messages.json', JSON.stringify(data, null, 2));

      - name: 提交并推送
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add messages.json
          git commit -m "Auto update"
          git push
