name: Update Messages Data
on:
  workflow_dispatch:
    inputs:
      action:
        required: true
        type: string
      data:
        required: false
        type: string

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Process
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const data = JSON.parse(fs.readFileSync('messages.json','utf8'));
            const action = ${{ toJSON(inputs.action) }};
            const d = ${{ toJSON(inputs.data) }} ? JSON.parse(${{ toJSON(inputs.data) }}) : {};

            switch(action){
              case 'addMsg': data.messages.unshift(d); break;
              case 'deleteMsg': data.messages.splice(d.index,1); break;
              case 'clearMsg': data.messages = []; break;
              case 'addLog': data.logs.unshift(d); break;
              case 'deleteLog': data.logs.splice(d.index,1); break;
              case 'clearLog': data.logs = []; break;
              case 'changePwd': data.normalPwd = d.newPwd; break;
            }

            fs.writeFileSync('messages.json', JSON.stringify(data,null,2));
      - name: Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add messages.json
          git commit -m "update"
          git push
