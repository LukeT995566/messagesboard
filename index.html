<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:#f5f7fa;padding:20px;display:flex;justify-content:center}
    .page{max-width:450px;width:100%}
    .card{background:#fff;border-radius:16px;box-shadow:0 2px 10px #00000010;padding:30px}
    .title{font-size:22px;text-align:center;margin-bottom:6px}
    .desc{color:#666;text-align:center;margin-bottom:25px}
    input,textarea{width:100%;height:44px;padding:0 14px;border:1px solid #ddd;border-radius:8px;margin-bottom:16px}
    textarea{height:120px}
    button{width:100%;height:44px;background:#007aff;color:#fff;border:none;border-radius:8px}
    .hidden{display:none}
    .item{background:#fff;border-radius:8px;padding:14px;margin-bottom:10px}
    .content{margin-bottom:6px}
    .info{font-size:12px;color:#999}
</style>
</head>
<body>

<div id="page1" class="page">
    <div class="card">
        <div class="title">完成注册</div>
        <div class="desc">请输入手机号继续</div>
        <input id="key" placeholder="请输入正确的手机号">
        <button onclick="login()">发送验证码</button>
    </div>
</div>

<div id="page2" class="page hidden">
    <textarea id="msg" placeholder="写下留言"></textarea>
    <button onclick="send()">发布留言</button>
    <div id="list" style="margin-top:20px"></div>
</div>

<script>
// ====================== 100% 填对你的信息 ======================
const GITEE_TOKEN = "004c701568527b8ea49b1832ce561c7c";
const GITEE_USER = "LukeT";
const GITEE_REPO = "messages-store";
const FILE = "messages.json";
// ==============================================================

const API = `https://gitee.com/api/v5/repos/${GITEE_USER}/${GITEE_REPO}/contents/${FILE}`;

async function login() {
  let v = document.getElementById("key").value;
  let data = await getJson();
  if (v == data.normalPwd || v == data.adminPwd) {
    page1.classList.add("hidden");
    page2.classList.remove("hidden");
    load();
  } else {
    alert("请输入正确的手机号");
  }
}

async function send() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return alert("请输入内容");
  let data = await getJson();
  let sha = await getSha();
  data.messages.unshift({
    content,
    time: new Date().toLocaleString()
  });
  await fetch(API, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      access_token: GITEE_TOKEN,
      content: btoa(JSON.stringify(data, null, 2)),
      message: "update message",
      sha
    })
  });
  alert("发布成功！");
  document.getElementById("msg").value = "";
  load();
}

async function load() {
  let data = await getJson();
  list.innerHTML = data.messages.map(m => `
    <div class="item">
      <div class="content">${m.content}</div>
      <div class="info">${m.time}</div>
    </div>
  `).join('');
}

async function getJson() {
  let res = await fetch(`${API}?access_token=${GITEE_TOKEN}`);
  let json = await res.json();
  return JSON.parse(atob(json.content));
}

async function getSha() {
  let res = await fetch(`${API}?access_token=${GITEE_TOKEN}`);
  let json = await res.json();
  return json.sha;
}
</script>
</body>
</html>
