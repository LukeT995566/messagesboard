<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui}
    body{background:#f2f5f7;padding:20px}
    .page{max-width:450px;margin:0 auto}
    .card{background:#fff;padding:30px;border-radius:20px}
    input,textarea,button{width:100%;margin:8px 0;padding:14px;border:1px solid #eee;border-radius:12px}
    button{background:#007aff;color:#fff;border:none}
    .hidden{display:none}
    .item{padding:14px 10px;border-bottom:1px solid #f2f2f2}
    .info{font-size:12px;color:#999;margin-top:6px}
</style>
</head>
<body>

<!-- 登录 -->
<div id="login" class="page">
  <div class="card">
    <h2>完成注册</h2>
    <p style="margin:10px 0 20px">请输入手机号继续</p>
    <input id="pwd" placeholder="请输入正确的手机号" type="text">
    <button onclick="login()">发送验证码</button>
  </div>
</div>

<!-- 普通用户 -->
<div id="user" class="page hidden">
  <div class="card">
    <textarea id="msg" placeholder="写下留言..."></textarea>
    <button onclick="send()">发布留言</button>
    <button onclick="back()">返回</button>
    <div id="msgList" style="margin-top:20px"></div>
  </div>
</div>

<!-- 管理员 -->
<div id="admin" class="page hidden">
  <div class="card">
    <input id="newPwd" placeholder="新普通密码">
    <button onclick="updatePwd()">修改密码</button>
    <button onclick="back()">返回</button>
    <div id="adminList" style="margin-top:20px"></div>
  </div>
</div>

<script>
// ================ 配置 =================
const TOKEN = "a902530aaec03576bef1e8dd8f73ccb2";
const USER = "LukeT";
const REPO = "messages-store";
const FILE = "messages.json";
const API = `https://gitee.com/api/v5/repos/${USER}/${REPO}/contents/${FILE}?access_token=${TOKEN}`;

// 全局
let currentData = null;

// ================= 登录逻辑（100% 简单暴力） =================
async function login() {
  let val = document.getElementById("pwd").value.trim();
  try {
    let res = await fetch(API);
    let json = await res.json();
    let data = JSON.parse(atob(json.content));
    currentData = data;

    // ========== 核心判断，绝对不会错 ==========
    if (val == data.normalPwd) {
      show("user");
      loadMsg();
    } else if (val == data.adminPwd) {
      show("admin");
      loadAdmin();
    } else {
      alert("请输入正确的手机号");
    }
  } catch (e) {
    alert("请输入正确的手机号");
  }
}

// ================= 工具 =================
function show(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.add("hidden"));
  document.getElementById(id).classList.remove("hidden");
}
function back() { show("login"); }

// ================= 留言 =================
async function loadMsg() {
  let res = await fetch(API);
  let json = await res.json();
  let d = JSON.parse(atob(json.content));
  document.getElementById("msgList").innerHTML = d.messages.map(m => `
  <div class="item">
    <div>${m.content}</div>
    <div class="info">📍${m.ip} | 🏙未知 | 📱${m.device}</div>
  </div>`).join('');
}

async function send() {
  let content = document.getElementById("msg").value.trim();
  if (!content) return;
  let res = await fetch(API);
  let j = await res.json();
  let d = JSON.parse(atob(j.content));
  d.messages.unshift({ content, ip:"未知IP", location:"未知", device:"未知设备", time:new Date().toLocaleString() });
  
  await fetch(`https://gitee.com/api/v5/repos/${USER}/${REPO}/contents/${FILE}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      access_token: TOKEN,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(d, null, 2)))),
      sha: j.sha,
      message: "update"
    })
  });
  document.getElementById("msg").value = "";
  loadMsg();
}

// ================= 管理员 =================
async function loadAdmin() {
  let res = await fetch(API);
  let j = await res.json();
  let d = JSON.parse(atob(j.content));
  let html = "";
  d.messages.forEach((m,i) => { html += `<div class="item">${m.content}<br><button onclick="del(${i})">删除</button></div>`; });
  document.getElementById("adminList").innerHTML = html;
}

async function del(i) {
  let res = await fetch(API);
  let j = await res.json();
  let d = JSON.parse(atob(j.content));
  d.messages.splice(i, 1);
  await fetch(`https://gitee.com/api/v5/repos/${USER}/${REPO}/contents/${FILE}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ access_token: TOKEN, content: btoa(unescape(encodeURIComponent(JSON.stringify(d)))), sha: j.sha, message: "del" })
  });
  loadAdmin();
}

async function updatePwd() {
  let np = document.getElementById("newPwd").value.trim();
  if (!np) return;
  let res = await fetch(API);
  let j = await res.json();
  let d = JSON.parse(atob(j.content));
  d.normalPwd = np;
  await fetch(`https://gitee.com/api/v5/repos/${USER}/${REPO}/contents/${FILE}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ access_token: TOKEN, content: btoa(unescape(encodeURIComponent(JSON.stringify(d)))), sha: j.sha, message: "pwd" })
  });
  alert("修改成功");
  document.getElementById("newPwd").value = "";
}
</script>
</body>
</html>
