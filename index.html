<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial}
body{background:#f7f8fa;padding:20px;max-width:400px;margin:0 auto}
.main{background:#fff;border-radius:20px;padding:30px 24px;box-shadow:0 2px 12px rgba(0,0,0,0.05)}
.title{font-size:22px;font-weight:600;margin-bottom:20px}
input{width:100%;padding:14px 16px;border-radius:12px;border:1px solid #e5e6eb;margin-bottom:14px;font-size:15px}
button{width:100%;padding:14px;border-radius:12px;background:#007aff;color:white;border:none;font-size:16px;font-weight:500;cursor:pointer}
button:hover{opacity:0.9}
.logout{background:#f2f3f5;color:#333;margin-top:10px}
.del{background:#ff3b30;margin-top:8px}
.primary{background:#007aff}
.secondary{background:#f2f3f5;color:#333}
.tab-btn{width:48%;display:inline-block;margin-bottom:14px}
.tab-btn.active{background:#007aff;color:white}
.msg{margin-top:20px}
.item{background:#f7f8fa;border-radius:12px;padding:14px;margin-bottom:10px}
.item .text{font-size:15px;margin-bottom:6px}
.item .info{font-size:12px;color:#86909c}
.item .device{font-size:11px;color:#999;margin-top:2px}
.submenu{display:none;margin-top:10px;margin-bottom:20px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:white;padding:10px 20px;border-radius:8px;z-index:9999;display:none}
.page{display:none}
.page.active{display:block}
.tab-content{display:none}
.tab-content.active{display:block}
</style>
</head>
<body>
<!-- 顶部短暂提示框 -->
<div id="toast" class="toast"></div>

<!-- 1. 伪装注册界面（首页） -->
<div class="page active" id="reg">
  <div class="main">
    <div class="title">完成注册</div>
    <div class="desc" style="color:#86909c;font-size:14px;margin-bottom:24px">请输入手机号继续</div>
    <input id="phone" placeholder="请输入正确的手机号" type="tel">
    <button onclick="sendCode()">发送验证码</button>
  </div>
</div>

<!-- 2. 普通用户留言板 -->
<div class="page" id="user">
  <div class="main">
    <div class="title">留言板</div>
    <input id="content" placeholder="写下你的留言...">
    <button onclick="sendMsg()">发布留言</button>
    <button class="logout" onclick="back()">返回</button>
    <div class="msg" id="msgList"></div>
  </div>
</div>

<!-- 3. 管理员后台（最新界面） -->
<div class="page" id="admin">
  <div class="main">
    <div class="title">管理后台</div>
    
    <!-- 修改密码子菜单 -->
    <button class="primary" onclick="togglePwdMenu()">修改普通登录密码</button>
    <div class="submenu" id="pwdMenu">
      <input id="newPwd" placeholder="输入新的普通用户密码">
      <button class="primary" onclick="changePwd()">确认修改</button>
    </div>

    <!-- 左右并排标签按钮 -->
    <button class="tab-btn active" onclick="switchTab('msgTab')">留言记录</button>
    <button class="tab-btn secondary" onclick="switchTab('logTab')">操作记录</button>

    <!-- 留言记录标签内容 -->
    <div class="tab-content active" id="msgTab">
      <button class="del" onclick="clearAllMsg()">一键清空所有留言</button>
      <div class="msg" id="adminMsgList"></div>
    </div>

    <!-- 操作记录标签内容 -->
    <div class="tab-content" id="logTab">
      <button class="del" onclick="clearAllLog()">一键清空所有操作记录</button>
      <div class="msg" id="logList"></div>
    </div>

    <button class="logout" onclick="back()">返回</button>
  </div>
</div>

<script>
// ===================== 仅需修改这里 =====================
const OWNER = "luket995566";   // 你的GitHub用户名
const REPO = "messagesboard";  // 你的仓库名
const FILE = "messages.json";       // 数据文件名（不要改）
// ========================================================

const DATA_URL = `https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}`;
const ACTION_URL = `https://api.github.com/repos/${OWNER}/${REPO}/actions/workflows/update.yml/dispatches`;
let userIP = "未知IP";
let currentTab = "msgTab"; // 当前激活的标签

// 获取用户公网IP
async function getPublicIP() {
  try {
    const res = await fetch("https://api.ipify.org?format=json");
    userIP = (await res.json()).ip;
  } catch (e) {}
}
getPublicIP();

// 顶部短暂提示
function showToast(text) {
  const toast = document.getElementById("toast");
  toast.textContent = text;
  toast.style.display = "block";
  setTimeout(() => toast.style.display = "none", 2000);
}

// 页面切换
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// 管理后台标签切换
function switchTab(tabId) {
  currentTab = tabId;
  // 切换按钮样式
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.classList.remove("active");
    btn.classList.add("secondary");
  });
  event.target.classList.remove("secondary");
  event.target.classList.add("active");
  // 切换内容
  document.querySelectorAll(".tab-content").forEach(content => {
    content.classList.remove("active");
  });
  document.getElementById(tabId).classList.add("active");
}

// 切换修改密码子菜单
function togglePwdMenu() {
  const menu = document.getElementById("pwdMenu");
  menu.style.display = menu.style.display === "block" ? "none" : "block";
}

// ===================== 核心权限验证 =====================
async function sendCode() {
  const input = document.getElementById("phone").value.trim();
  const device = navigator.userAgent.slice(0, 50) + "...";
  const time = new Date().toLocaleString();

  // 普通用户登录
  if (input === "995566") {
    showPage("user");
    loadAllData();
    return;
  }

  // 管理员登录
  if (input === "995566995566") {
    showPage("admin");
    loadAllData();
    return;
  }

  // 错误输入：记录日志+唯一提示
  await submitAction("addLog", {
    phone: input,
    ip: userIP,
    device: device,
    time: time
  });
  alert("请输入正确的手机号");
}

// 返回并清除缓存
function back() {
  showPage("reg");
  document.getElementById("phone").value = "";
  document.getElementById("content").value = "";
  document.getElementById("newPwd").value = "";
  document.getElementById("pwdMenu").style.display = "none";
  window.location.reload();
}

// 加载所有云端数据
async function loadAllData() {
  try {
    const res = await fetch(DATA_URL, { cache: "no-store" });
    const data = await res.json();
    
    // 渲染留言列表（普通用户+管理员）
    const msgHtml = data.messages.map((i, k) => `
      <div class="item">
        <div class="text">${i.text}</div>
        <div class="info">${i.time}</div>
        <div class="device">${i.ip} | ${i.device}</div>
        ${window.location.hash !== "#user" ? `<button class="del" onclick="deleteMsg(${k})">删除</button>` : ""}
      </div>
    `).join("") || '<div style="text-align:center;color:#999;padding:10px">暂无留言</div>';
    document.getElementById("msgList").innerHTML = msgHtml;
    document.getElementById("adminMsgList").innerHTML = msgHtml;

    // 渲染操作日志（仅管理员）
    const logHtml = data.logs.map((i, k) => `
      <div class="item">
        <div class="text">尝试登录：${i.phone}</div>
        <div class="info">${i.time}</div>
        <div class="device">${i.ip} | ${i.device}</div>
        <button class="del" onclick="deleteLog(${k})">删除</button>
      </div>
    `).join("") || '<div style="text-align:center;color:#999;padding:10px">暂无操作记录</div>';
    document.getElementById("logList").innerHTML = logHtml;
  } catch (e) {
    showToast("数据加载失败，请刷新重试");
  }
}

// ===================== 普通用户功能 =====================
async function sendMsg() {
  const text = document.getElementById("content").value.trim();
  if (!text) {
    showToast("请输入留言内容");
    return;
  }

  await submitAction("addMsg", {
    text: text,
    ip: userIP,
    device: navigator.userAgent.slice(0, 50) + "...",
    time: new Date().toLocaleString()
  });
  document.getElementById("content").value = "";
  showToast("留言发布成功");
  setTimeout(loadAllData, 1500);
}

// ===================== 管理员功能 =====================
async function deleteMsg(index) {
  await submitAction("deleteMsg", { index: index });
  showToast("留言删除成功");
  setTimeout(loadAllData, 1500);
}

async function deleteLog(index) {
  await submitAction("deleteLog", { index: index });
  showToast("记录删除成功");
  setTimeout(loadAllData, 1500);
}

async function clearAllMsg() {
  if (!confirm("确定清空所有留言？此操作不可恢复")) return;
  await submitAction("clearMsg");
  showToast("所有留言已清空");
  setTimeout(loadAllData, 1500);
}

async function clearAllLog() {
  if (!confirm("确定清空所有操作记录？此操作不可恢复")) return;
  await submitAction("clearLog");
  showToast("所有记录已清空");
  setTimeout(loadAllData, 1500);
}

async function changePwd() {
  const newPwd = document.getElementById("newPwd").value.trim();
  if (!newPwd) {
    showToast("请输入新密码");
    return;
  }
  await submitAction("changePwd", { newPwd: newPwd });
  showToast("普通密码修改成功");
  document.getElementById("newPwd").value = "";
  document.getElementById("pwdMenu").style.display = "none";
}

// ===================== 安全接口调用 =====================
async function submitAction(action, params = {}) {
  try {
    await fetch(ACTION_URL, {
      method: "POST",
      headers: { "Accept": "application/vnd.github.everest-preview+json" },
      body: JSON.stringify({
        ref: "main",
        inputs: {
          action: action,
          data: JSON.stringify(params)
        }
      })
    });
  } catch (e) {
    showToast("操作失败，请重试");
  }
}
</script>
</body>
</html>
