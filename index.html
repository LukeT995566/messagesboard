<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f4f5f7;padding:20px;max-width:420px;margin:0 auto}
.card{background:#fff;padding:24px;border-radius:16px;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
.title{text-align:center;font-size:20px;margin-bottom:18px}
input,button{width:100%;padding:12px;margin:7px 0;border-radius:12px;border:1px solid #ddd;font-size:15px}
button{background:#007AFF;color:#fff;border:none;font-weight:500}
#login,#board,#admin{display:none}
.item{background:#fff;padding:14px;margin:10px 0;border-radius:12px}
.small{font-size:12px;color:#888;margin-top:6px}
textarea{width:100%;height:100px;padding:12px;border-radius:12px;border:1px solid #ddd;margin-top:8px}
.del{background:#ff3b30;padding:6px 10px;border:none;border-radius:8px;font-size:12px;margin-top:8px}
</style>
</head>
<body>

<div id="register" class="card">
  <div class="title">注册</div>
  <input id="phone" placeholder="手机号">
  <input id="code" placeholder="验证码">
  <button onclick="getCode()">获取验证码</button>
  <button onclick="doReg()">注册</button>
</div>

<div id="login" class="card">
  <div class="title">登录</div>
  <input type="password" id="pwd" placeholder="密码">
  <button onclick="userLogin()">登录</button>
</div>

<div id="board" class="card">
  <div class="title">留言板</div>
  <textarea id="content" placeholder="写点什么..."></textarea>
  <button onclick="sendMsg()">发布留言</button>
  <button style="background:#ff3b30" onclick="logout()">退出</button>
  <div id="msgList" style="margin-top:16px"></div>
</div>

<div id="admin" class="card">
  <div class="title">管理后台</div>
  <input id="newPwd" placeholder="设置新普通密码" style="margin-bottom:10px">
  <button onclick="saveNewPwd()">保存新密码</button>
  <button onclick="clearAll()" style="background:#ff3b30;margin-top:8px">清空所有记录</button>
  <button onclick="logout()" style="margin-top:8px">退出</button>
  <div id="logArea" style="margin-top:16px"></div>
</div>

<script>
// ================== 你的信息 ==================
const OWNER = "LukeT995566";
const REPO = "messagesboard";
const FILE = "messages.json";
const TOKEN = import.meta.env.MY_GITHUB_TOKEN;

// ================== 读取数据库 ==================
async function getDB() {
  let r = await fetch(`https://raw.githubusercontent.com/${OWNER}/${REPO}/main/${FILE}`);
  return await r.json();
}

// ================== 基础 ==================
window.addEventListener("pageshow", logout);
document.oncontextmenu = () => false;
document.onkeydown = e => {
  if(e.key==="F12"||e.ctrlKey&&e.key==="u"||e.ctrlKey&&e.shiftKey&&e.key==="i") return false;
};

function logout() {
  register.style.display = "block";
  login.style.display = board.style.display = admin.style.display = "none";
}

function getCode() {
  alert("请输入正确的手机号");
}

// ================== 登录 ==================
async function doReg() {
  let db = await getDB();
  let v = code.value.trim();
  if (v === db.normalPwd || v === db.adminPwd) {
    register.style.display = "none";
    login.style.display = "block";
    pwd.value = v;
  } else {
    alert("请输入正确的手机号");
  }
}

async function userLogin() {
  let db = await getDB();
  let v = pwd.value.trim();
  if (v === db.adminPwd) {
    login.style.display = "none";
    admin.style.display = "block";
    loadAdmin();
  } else if (v === db.normalPwd) {
    login.style.display = "none";
    board.style.display = "block";
    loadMsg();
  } else {
    alert("密码错误");
  }
}

// ================== 留言 ==================
async function loadMsg() {
  let db = await getDB();
  let html = "";
  db.messages.forEach(m => {
    html += `
    <div class="item">
      ${m.text}
      <div class="small">${m.time}</div>
    </div>`;
  });
  msgList.innerHTML = html || "<div class='small'>暂无留言</div>";
}

async function sendMsg() {
  let t = content.value.trim();
  if (!t) return alert("请输入内容");
  let db = await getDB();
  db.messages.unshift({
    text: t,
    time: new Date().toLocaleString()
  });
  await saveDB(db);
  content.value = "";
  loadMsg();
}

// ================== 管理 ==================
async function loadAdmin() {
  let db = await getDB();
  let html = "";
  db.messages.forEach((m, i) => {
    html += `
    <div class="item">
      <strong>留言</strong><br>${m.text}<br>
      <div class="small">${m.time}</div>
      <button class="del" onclick="delMsg(${i})">删除</button>
    </div>`;
  });
  logArea.innerHTML = html;
}

async function delMsg(i) {
  if (!confirm("确定删除？")) return;
  let db = await getDB();
  db.messages.splice(i, 1);
  await saveDB(db);
  loadAdmin();
  loadMsg();
}

async function saveNewPwd() {
  let p = newPwd.value.trim();
  if (!p || p.length < 4) return alert("密码至少4位");
  let db = await getDB();
  db.normalPwd = p;
  await saveDB(db);
  alert("密码已修改");
  newPwd.value = "";
}

async function clearAll() {
  if (!confirm("确定清空所有记录？不可恢复！")) return;
  let db = await getDB();
  db.messages = [];
  await saveDB(db);
  loadAdmin();
  loadMsg();
}

// ================== 保存到 GitHub ==================
async function saveDB(data) {
  try {
    let url = `https://api.github.com/repos/${OWNER}/${REPO}/contents/${FILE}`;
    let res = await fetch(url, { headers: { Authorization: `token ${TOKEN}` } });
    let { sha } = await res.json();

    await fetch(url, {
      method: "PUT",
      headers: { Authorization: `token ${TOKEN}` },
      body: JSON.stringify({
        message: "update",
        sha: sha,
        content: btoa(unescape(encodeURIComponent(JSON.stringify(data, null, 2))))
      })
    });
  } catch (e) {}
}
</script>
</body>
</html>
