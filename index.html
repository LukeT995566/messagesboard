<!DOCTYPE html>
<html lang="zh-CN">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>公共留言板</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
  body{background:#f4f5f7;padding:20px;max-width:420px;margin:0 auto}
  .card{background:#fff;padding:24px;border-radius:16px}
  input,button,textarea{width:100%;padding:12px;margin:6px 0;border-radius:12px;border:1px solid #ddd}
  button{background:#007AFF;color:#fff;border:none}
  .item{background:#fff;padding:14px;margin:10px 0;border-radius:12px}
  .hide{display:none}
</style>

<div id="loginPage" class="card">
  <input id="pwd" placeholder="输入密码登录" type="password">
  <button onclick="login()">登录</button>
</div>

<div id="userPage" class="card hide">
  <textarea id="msg" placeholder="写留言…"></textarea>
  <button onclick="postMsg()">发布留言</button>
  <button onclick="logout()">退出</button>
  <div id="msgList"></div>
</div>

<div id="adminPage" class="card hide">
  <input id="newPwd" placeholder="设置新普通密码">
  <button onclick="changePwd()">修改密码</button>
  <button onclick="clearAll()">清空所有留言</button>
  <button onclick="logout()">退出</button>
  <div id="adminList"></div>
</div>

<script>
const API = "https://api.jsonserver.io/free/messagesboard_data";

async function get(){
  let res = await fetch(API);
  return await res.json() || {pwd:"995566",admin:"995566995566",list:[]};
}

async function set(d){
  await fetch(API,{method:"PUT",body:JSON.stringify(d)});
}

function show(id){
  loginPage.classList.add('hide');
  userPage.classList.add('hide');
  adminPage.classList.add('hide');
  document.getElementById(id).classList.remove('hide');
}

async function login(){
  let v = pwd.value;
  let d = await get();
  if(v===d.admin){show('adminPage');renderAdmin();}
  else if(v===d.pwd){show('userPage');renderUser();}
  else alert("密码错误");
}

function logout(){show('loginPage');}

async function renderUser(){
  let d = await get();
  msgList.innerHTML = d.list.map(i=>`<div class='item'>${i.t}<br><small>${i.d}</small></div>`).join('')||"暂无留言";
}

async function renderAdmin(){
  let d = await get();
  adminList.innerHTML = d.list.map((i,k)=>`<div class='item'>${i.t}<br><button onclick='del(${k})'>删除</button></div>`).join('');
}

async function postMsg(){
  let t = msg.value.trim();
  if(!t)return;
  let d = await get();
  d.list.unshift({t,d:new Date().toLocaleString()});
  await set(d);
  msg.value="";
  renderUser();
}

async function del(k){
  let d = await get();
  d.list.splice(k,1);
  await set(d);
  renderAdmin();
  renderUser();
}

async function changePwd(){
  let v = newPwd.value.trim();
  if(!v)return;
  let d = await get();
  d.pwd = v;
  await set(d);
  alert("修改成功");
  newPwd.value="";
}

async function clearAll(){
  let d = await get();
  d.list = [];
  await set(d);
  renderAdmin();
  renderUser();
}
</script>
</html>
